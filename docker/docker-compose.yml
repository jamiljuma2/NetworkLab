version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: networklab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: networklab
      POSTGRES_PASSWORD: networklab
      POSTGRES_DB: networklab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    image: node:22
    container_name: networklab-backend
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ../backend:/app
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://networklab:networklab@postgres:5432/networklab
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    image: node:22
    container_name: networklab-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../frontend:/app
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
