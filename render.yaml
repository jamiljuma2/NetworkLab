services:
  - type: web
    name: networklab-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NMAP_PATH
        value: /usr/bin/nmap
      - key: JWT_TTL
        value: 8h
      - key: CLIENT_ORIGIN
        value: https://network-lab-gilt.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
